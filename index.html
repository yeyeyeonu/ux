<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SCH.Stage</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body class="home-page">
    <main class="phone-frame main-frame">
        <section class="now-section">
            <div class="app-head">
                <p>SCH • STAGE • BAND • THEATER • MOVIE • MUSIC • SHOW</p>
                <details class="side-menu app-menu">
                    <summary aria-label="메뉴">☰</summary>
                    <nav>
                        <strong>SCH.STAGE</strong>
                        <a href="index.html">메인</a>
                        <a href="monthly.html">월별 공연</a>
                        <a href="all-shows.html">전체 공연</a>
                        <a href="mypage.html">마이페이지</a>
                    </nav>
                </details>
            </div>

            <h1 class="stage-logo">SCH.STAGE</h1>

            <div class="headline">
                <h2>NOW SHOWING</h2>
            </div>

            <section class="poster-strip" aria-label="추천 공연 포스터">
                <div class="poster-track" id="featureTrack"></div>
                <button class="carousel-arrow prev" type="button" id="featurePrev" aria-label="이전 포스터">‹</button>
                <button class="carousel-arrow next" type="button" id="featureNext" aria-label="다음 포스터">›</button>
                <div class="carousel-dots" id="featureDots" aria-label="포스터 선택"></div>
            </section>

            <section class="folder-showcase" aria-label="장르별 공연">
                <div class="folder-tabs">
                    <button class="active" type="button" data-folder-tab="밴드">밴드</button>
                    <button type="button" data-folder-tab="연극">연극</button>
                    <button type="button" data-folder-tab="영화제">영화제</button>
                </div>
                <div class="mini-picks" id="folderPicks"></div>
            </section>

            <section class="story-stack" id="storyStack" aria-label="추천 공연 이야기"></section>
        </section>
    </main>

    <script src="js/data.js"></script>
    <script src="js/common.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
